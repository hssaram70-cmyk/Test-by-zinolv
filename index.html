<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI KURDISH | ئەم پەڕەیە بەڕێوە دەچێت لەلایەن نـۆڵـڤ</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Noto+Naskh+Arabic:wght@700&family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
        --primary: #07040f;
        --gold: #c9a96e;
        --gold-light: #e8d5a3;
        --accent-cyan: #00f2ff;
        --accent-red: #ff4d4d;
        --glass: rgba(10, 5, 20, 0.85); 
        --purple-glow: rgba(160, 80, 255, 0.3);
    }

    body {
        background: var(--primary);
        color: #fff;
        font-family: 'Vazirmatn', sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
        user-select: none;
        scroll-behavior: smooth;
    }

    /* ── BACKGROUND & RAYS ── */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; }
    .rays {
        position: fixed; top:-50%; left:50%; width:300%; height:300%; z-index: 1; pointer-events: none;
        background: conic-gradient(from 0deg at 50% 50%, 
            transparent 0deg, var(--purple-glow) 0.2deg, transparent 0.5deg,
            transparent 2deg, var(--purple-glow) 2.2deg, transparent 2.5deg);
        animation: raysR 50s linear infinite;
        opacity: 0.6;
    }
    @keyframes raysR { from { transform: translate(-50%, -20%) rotate(0deg); } to { transform: translate(-50%, -20%) rotate(360deg); } }
    
    .stars { position:fixed; inset:0; z-index:1; pointer-events:none; }
    .star { position:absolute; border-radius:50%; background:white; animation: twk var(--d) var(--dl) ease-in-out infinite; }
    @keyframes twk { 0%,100%{ opacity:var(--o); transform: scale(1); } 50%{ opacity:0.1; transform: scale(0.6); } }

    .mbti-main {
        font-family: 'Bodoni Moda', serif; font-size: clamp(40px, 10vw, 80px);
        font-weight: 900; font-style: italic; line-height: 0.9;
        background: linear-gradient(90deg, #fff, #c9a96e, #a78bfa, #c9a96e, #fff);
        background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: textFlow 5s linear infinite;
    }
    @keyframes textFlow { to { background-position: 200% center; } }

    .main-wrapper { position: relative; z-index: 10; max-width: 700px; margin: 0 auto; padding: 40px 15px; text-align: center; }

    /* ── SOCIAL BUTTONS ── */
    .social-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
        flex-wrap: wrap;
    }
    .social-btn {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.4s;
        text-decoration: none;
        display: inline-block;
        font-size: 0.9rem;
    }
    .social-btn:hover {
        background: var(--gold);
        color: #000;
        box-shadow: 0 0 15px var(--gold);
    }

    /* ── TELEGRAM GROUP LINK ── */
    .telegram-banner {
        background: rgba(0, 136, 204, 0.15);
        border: 1px solid rgba(0, 136, 204, 0.4);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 25px;
        font-weight: 800;
    }
    .telegram-banner a {
        color: #00f2ff;
        text-decoration: none;
    }

    /* ── CARDS ── */
    .q-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 20px; margin-bottom: 30px; transition: 0.4s; }
    .circles-row { display: flex; align-items: center; justify-content: center; gap: clamp(5px, 2vw, 12px); direction: rtl; }
    .circle { border-radius: 50%; border: 2px solid #555; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05); }

    /* ── RESULTS ── */
    .stats-container { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 25px; border: 1px solid rgba(201,169,110,0.2); }
    .stat-bar-bg { background: rgba(255,255,255,0.05); height: 14px; border-radius: 10px; overflow: hidden; margin-top: 6px; }
    .stat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #fff); transition: 1.5s ease-out; }
    .stat-labels { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.9rem; color: var(--gold-light); }

    .desc-box { background: var(--glass); padding: 30px; border-radius: 25px; line-height: 2; text-align: justify; border-right: 5px solid var(--gold); margin: 20px 0; font-size: 1.1rem; }
    .strength-weakness { display: grid; grid-template-columns: 1fr; gap: 20px; margin: 30px 0; }
    .sw-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; text-align: right; }
    .sw-card h4 { color: var(--gold); margin-bottom: 15px; font-size: 1.3rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .sw-card p { line-height: 1.8; font-size: 1.05rem; color: #ddd; }

    .partners-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
    .partner-card { background: rgba(201,169,110,0.1); border: 1px solid var(--gold); padding: 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 800; }
    .partner-card:hover { background: var(--gold); color: #000; }

    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
    .modal-content { background: #0f0a1a; border: 2px solid var(--gold); padding: 35px; border-radius: 30px; max-width: 500px; width: 100%; text-align: center; position: relative; }
    .close-modal { position: absolute; top: 15px; left: 20px; font-size: 28px; cursor: pointer; color: var(--gold); }

    .btn-action { background: transparent; color: #fff; border: 1px solid var(--gold); padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.4s; }
    .btn-action:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
    
    .result-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .at-badge {
        background: linear-gradient(135deg, var(--gold), #a78bfa);
        color: #000;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: 900;
        font-size: 1.2rem;
    }
    </style>
</head>
<body>
    <div id="pLine" style="position:fixed; top:0; height:4px; background:var(--gold); z-index:2000; transition:0.5s; width:0%;"></div>
    <canvas id="bgCanvas"></canvas>
    <div class="rays"></div>
    <div class="stars" id="starLayer"></div>

    <div class="main-wrapper">
        <!-- TELEGRAM GROUP BANNER -->
        <div class="telegram-banner">
            <span style="color:#fff;">گرووپ چـاتـی کەسایەتیەکان لە تەلەگرام بە هاتنتان دڵخۆش دەبین:</span><br>
            <a href="https://t.me/mbti11" target="_blank">@mbti11</a>
        </div>

        <!-- SOCIAL LINKS TOP -->
        <div class="social-links" id="social-top">
            <a href="https://t.me/mbti11" target="_blank" class="social-btn">تەلەگرام</a>
            <a href="https://t.me/deansle" target="_blank" class="social-btn">پەیوەندی</a>
            <a href="https://www.tiktok.com/@jinx.s64" target="_blank" class="social-btn">تیکتۆک</a>
        </div>

        <div id="screen-start">
            <div style="margin-bottom:40px;">
                <div style="font-family:'Noto Naskh Arabic'; font-size:24px; color:var(--gold); font-weight:700;">نـۆڵـڤ</div>

            </div>
            <button class="btn-action" onclick="startQuiz()">دەستپێکردنی تاقیکردنەوە</button>
        </div>

        <div id="screen-quiz" style="display:none;">
            <h2 id="section-title" style="color:var(--gold); margin-bottom:25px; font-weight:800;"></h2>
            <div id="q-area"></div>
            <div style="margin-top:30px; display:flex; justify-content:center; gap:15px;">
                <button class="btn-action" style="border-color:#444;" onclick="prev()">گەڕانەوە</button>
                <button class="btn-action" id="nextBtn" onclick="next()">بەردەوام بە</button>
            </div>
        </div>

        <div id="screen-info" style="display:none;">
            <div style="background:var(--glass); border:1px solid var(--gold); padding:40px 25px; border-radius:30px; max-width:400px; margin:0 auto;">
                <h3 style="color:var(--gold); margin-bottom:20px;">زانیاری کۆتایی</h3>
                <select id="age-input" style="width:100%; padding:12px; border-radius:15px; background:#111; color:#fff; border:1px solid #444; margin-bottom:20px; font-family:'Vazirmatn'; outline:none;">
                    <option value="" disabled selected>تەمەنت هەڵبژێرە</option>
                </select>
                <div style="display:flex; gap:10px; margin-bottom:25px;">
                    <button id="btn-m" class="btn-action" style="flex:1" onclick="setG('نێر')">نێر</button>
                    <button id="btn-f" class="btn-action" style="flex:1" onclick="setG('مێ')">مێ</button>
                </div>
                <button class="btn-action" style="width:100%;" onclick="calculateResult()">پیشاندانی ئەنجام</button>
            </div>
        </div>

        <div id="screen-result" style="display:none;">
            <div class="result-header">
                <h1 id="res-code" style="font-size:5.5rem; color:var(--gold); font-family:'Bodoni Moda'; margin:0;"></h1>
                <span id="res-at" class="at-badge"></span>
            </div>
            <h2 id="res-name" style="font-size:2.2rem; margin-bottom:5px; color:#fff;"></h2>
            <div id="user-info-display" style="color:var(--gold); font-weight:800; margin-bottom:25px; opacity:0.8;"></div>
            
            <div id="stats-area" class="stats-container"></div>
            <div class="desc-box" id="res-desc"></div>
            
            <div class="strength-weakness">
                <div class="sw-card">
                    <h4>خاڵە بەهێزەکانت (Strengths)</h4>
                    <p id="res-strengths"></p>
                </div>
                <div class="sw-card">
                    <h4>خاڵە لاوازەکانت (Weaknesses)</h4>
                    <p id="res-weaknesses"></p>
                </div>
            </div>

            <h3 style="color:var(--gold); margin:40px 0 20px; font-size:1.5rem;">هاوبەشە گونجاوەکان</h3>
            <div id="partners-area" class="partners-grid"></div>

            <!-- SOCIAL LINKS BOTTOM -->
            <div class="social-links" id="social-bottom" style="margin-top:40px;">
                <a href="https://t.me/mbti11" target="_blank" class="social-btn">گرووپی تەلەگرام</a>
                <a href="https://t.me/deansle" target="_blank" class="social-btn">پەیوەندی</a>
                <a href="https://www.tiktok.com/@jinx.s64" target="_blank" class="social-btn">تیکتۆک</a>
            </div>

            <button class="btn-action" style="width:100%; margin-top:40px;" onclick="location.reload()">دووبارە تاقیکردنەوە</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modal-title" style="color:var(--gold); margin-bottom:15px;"></h3>
            <p id="modal-desc" style="line-height:2; text-align:justify; color:#ccc;"></p>
        </div>
    </div>

<script>
    const questions = [
        {q: "لە ناو کۆمەڵدا هەست بە وزەی زۆر دەکەم دەکەم", v: "E"},
        {q: "حەز دەکەم کاتەکانم لەگەڵ هاوڕێکانم بەسەر ببەرم نەک بە تەنیا", v: "E"},

        {q: "بازنەی هاوڕێیەتییم فراوانە", v: "E"},
        {q: "بۆ من ئاسانە بابەتێکی نوێ لەگەڵ کەسێکی نامۆ دەست پێ بکەم", v: "E"},
        {q: "لە شوێنی کار یان خوێندن حەز دەکەم بە گرووپ کار بکەم", v: "E"},

        {q: "حەز دەکەم دەوروبەرم پڕ بێت لە دەنگ و جووڵە", v: "E"},
        {q: "قسە لەگەڵ کەسانی نامۆ دەکەم کاتێک لە شوێنێکی گشتیدا چاوەڕێ دەکەم", v: "E"},

        {q: "من زیاتر سەرنجم لەسەر ئەو شتانەیە کە ئێستا ڕوودەدەن", v: "S"},

        "INTP": "INTP یارمەتیت دەدات لایەنە وردەکانی هەر بابەتێک ببینی بەبێ هەست و سۆز.",
        "INFP": "ئەم پەیوەندییە پڕ دەبێت لە میهرەبانی و تێگەیشتنی قووڵ بۆ بەهاکانی یەکتر.",
        "ENFJ": "کاریزمای ENFJ یارمەتیت دەدات لایەنە کۆمەڵایەتییەکانت باشتر بکەیت.",
        "ISTP": "هەردووکتان گرنگی بە کردەیی بوون دەدەن و کێشەکان بە خێرایی چارەسەر دەکەن.",
        "ESTJ": "سەرکردایەتی و ڕێکی ESTJ لەگەڵ وردبینی تۆدا یەک دەگرێتەوە بۆ ژیانێکی جێگیر.",
        "ISFJ": "پارێزگاری و گرنگیدانی ISFJ وات لێ دەکات هەمیشە هەست بە ئارامی و دڵنیایی بکەیت.",
        "ESTP": "ئازایەتی ESTP وزەت پێ دەبەخشێت و فێرت دەکات چێژ لە ساتەکان وەربگریت.",
        "ESFJ": "کۆمەڵایەتی بوونی ئەو وا دەکات هەمیشە هەست بکەیت بەشێکیت لە کۆمەڵگەیەکی بەهێز.",
        "ISFP": "ئەو بە شێوەیەکی هونەری ژیان دەبینێت و ئەمەش بۆ تۆ زۆر سەرنجڕاکێش دەبێت.",
        "ISTJ": "متمانە و بەهێزی بنەمای ئەم پەیوەندییەیە، هەردووکتان کەسانی زۆر جێگیرن.",
        "ESFP": "ESFP دەتوانێت ڕۆتینی ژیانت بشکێنێت و نیشانت بدات چۆن بە سادەیی دڵخۆش بیت."     
             };

    // --- Core Logic ---
    let curPage = 0; let answers = {}; const itemsPerPage = 23;
    let userGender = ""; let userAge = "";

    const ageSelect = document.getElementById('age-input');
    for(let i=12; i<=60; i++) {
        let opt = document.createElement('option'); opt.value = i; opt.innerText = i + " ساڵ";
        ageSelect.appendChild(opt);
    }

    function startQuiz() {
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-quiz').style.display = 'block';
        renderQuestions();
    }

    function renderQuestions() {
        const area = document.getElementById('q-area'); area.innerHTML = "";
        const start = curPage * itemsPerPage;
        const end = Math.min(start + itemsPerPage, questions.length);
        const titles = ["وزە و چالاکی", "تێڕوانین بۆ جیهان", "بڕیاردان و لۆژیک", "شێوازی ژیان"];
        document.getElementById('section-title').innerText = titles[curPage];

        for (let i = start; i < end; i++) {
            area.innerHTML += `
                <div class="q-card" id="card-${i}">
                    <div style="font-size:1.2rem; margin-bottom:25px; font-weight:800; line-height:1.6; color:var(--gold-light);">${questions[i].q}</div>
                    <div class="circles-row">
                        <div class="circle" onclick="saveAns(${i},3)"  id="d-${i}-p3" style="width:42px; height:42px;"></div>
                        <div class="circle" onclick="saveAns(${i},2)"  id="d-${i}-p2" style="width:34px; height:34px;"></div>
                        <div class="circle" onclick="saveAns(${i},1)"  id="d-${i}-p1" style="width:26px; height:26px;"></div>
                        <div class="circle" onclick="saveAns(${i},0)"  id="d-${i}-0" style="width:18px; height:18px;"></div>
                        <div class="circle" onclick="saveAns(${i},-1)" id="d-${i}-n1" style="width:26px; height:26px;"></div>
                        <div class="circle" onclick="saveAns(${i},-2)" id="d-${i}-n2" style="width:34px; height:34px;"></div>
                        <div class="circle" onclick="saveAns(${i},-3)" id="d-${i}-n3" style="width:42px; height:42px;"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; max-width:320px; margin:15px auto 0; font-size:0.9rem; font-weight:800; opacity:0.6;">
                        <span style="color:var(--accent-cyan)">بەڵێ</span>
                        <span style="color:var(--accent-red)">نەخێر</span>
                    </div>
                </div>`;
            if (answers[i] !== undefined) updateUI(i, answers[i]);
        }
        window.scrollTo({top:0, behavior:'smooth'});
        document.getElementById('pLine').style.width = ((curPage + 1) / 4 * 100) + "%";
    }

    function saveAns(id, val) { 
        answers[id] = val; updateUI(id, val); 
        setTimeout(() => {
            const nextCard = document.getElementById(`card-${id + 1}`);
            if (nextCard) window.scrollTo({ top: nextCard.offsetTop - 120, behavior: 'smooth' });
        }, 200);
    }

    function updateUI(id, val) {
        const card = document.getElementById(`card-${id}`); if(!card) return;
        const dots = card.querySelectorAll('.circle');
        dots.forEach(d => { d.style.background="rgba(255,255,255,0.05)"; d.style.boxShadow="none"; });
        let tid = val===0 ? `d-${id}-0` : (val<0 ? `d-${id}-n${Math.abs(val)}` : `d-${id}-p${val}`);
        let target = document.getElementById(tid);
        let color = val === 0 ? "#777" : (val < 0 ? "var(--accent-red)" : "var(--accent-cyan)");
        target.style.background = color; target.style.boxShadow = `0 0 15px ${color}`;
    }

    function next() {
        const start = curPage * itemsPerPage;
        const end = Math.min(start + itemsPerPage, questions.length);
        for(let i=start; i<end; i++) { if(answers[i] === undefined) { alert("تکایە هەموو وەڵامەکان پڕ بکەرەوە"); return; } }
        if (curPage < 3) { curPage++; renderQuestions(); }
        else { document.getElementById('screen-quiz').style.display='none'; document.getElementById('screen-info').style.display='block'; window.scrollTo(0,0); }
    }
    function prev() { if (curPage > 0) { curPage--; renderQuestions(); } }

    function setG(g) {
        userGender = g;
        document.getElementById('btn-m').style.background = g==='نێر' ? 'var(--gold)' : 'transparent';
        document.getElementById('btn-f').style.background = g==='مێ' ? 'var(--gold)' : 'transparent';
        document.getElementById('btn-m').style.color = g==='نێر' ? '#000' : '#fff';
        document.getElementById('btn-f').style.color = g==='مێ' ? '#000' : '#fff';
    }

    function calculateResult() {
        userAge = document.getElementById('age-input').value;
        if(!userGender || !userAge) { alert("تەمەن و ڕەگەز دیاری بکە"); return; }

        let s = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
        questions.forEach((q, i) => {
            let v = answers[i] || 0, type = q.v;
            let opposite = {E:'I', S:'N', T:'F', J:'P', I:'E', N:'S', F:'T', P:'J'}[type];
            if(v > 0) s[type] += v; else if(v < 0) s[opposite] += Math.abs(v);
        });
        
        const getP = (a, b) => Math.round((s[a] / (s[a] + s[b] || 1)) * 100);
        const e_i = getP('E','I'), s_n = getP('S','N'), t_f = getP('T','F'), j_p = getP('J','P');
        const baseType = (e_i>=50?'E':'I')+(s_n>=50?'S':'N')+(t_f>=50?'T':'F')+(j_p>=50?'J':'P');
        
        // Calculate A/T based on J-P axis (closer to 50% = T, further = A)
        const atSuffix = Math.abs(j_p - 50) > 15 ? '-A' : '-T';

        document.getElementById('screen-info').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('res-code').innerText = baseType;
        document.getElementById('res-at').innerText = atSuffix;
        const data = resultsData[baseType];
        document.getElementById('res-name').innerText = data.n;
        document.getElementById('res-desc').innerText = data.d;
        document.getElementById('res-strengths').innerText = data.s;
        document.getElementById('res-weaknesses').innerText = data.w;
        document.getElementById('user-info-display').innerText = `${userGender} | ${userAge} ساڵ`;

        const statsArea = document.getElementById('stats-area');
        const makeBar = (l, r, p) => `
            <div style="margin-bottom:15px;">
                <div class="stat-labels"><span>${l}</span><span>${p}%</span><span>${r}</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${p}%"></div></div>
            </div>`;
        statsArea.innerHTML = makeBar('E (دەرەکی)', 'I (ناوەکی)', e_i) + makeBar('S (واقیعی)', 'N (خەیاڵی)', s_n) + 
                             makeBar('T (لۆژیکی)', 'F (هەستی)', t_f) + makeBar('J (ڕێکخراو)', 'P (سەربەست)', j_p);

        const partnersArea = document.getElementById('partners-area');
        partnersArea.innerHTML = "";
        data.p.forEach(pt => {
            const div = document.createElement('div');
            div.className = "partner-card";
            div.innerText = pt;
            div.onclick = () => openModal(pt);
            partnersArea.appendChild(div);
        });
        window.scrollTo(0,0);
    }

    function openModal(type) {
        document.getElementById('modal-title').innerText = "گونجانی تۆ لەگەڵ " + type;
        document.getElementById('modal-desc').innerText = partnerReasons[type] || "ئەم دوو کەسایەتییە لە زۆر لایەنەوە تەواکەری یەکترن.";
        document.getElementById('modal').style.display = "flex";
    }
    function closeModal() { document.getElementById('modal').style.display = "none"; }

    // --- Visuals ---
    const layer = document.getElementById('starLayer');
    for(let i=0; i<150; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const z = Math.random() * 2.5;
        s.style.cssText = `width:${z}px; height:${z}px; left:${Math.random()*100}%; top:${Math.random()*100}%; --d:${2+Math.random()*5}s; --dl:${Math.random()*6}s; --o:${0.3+Math.random()*0.7};`;
        layer.appendChild(s);
    }
    const cvs = document.getElementById('bgCanvas'); const ctx = cvs.getContext('2d');
    let W, H; function resize(){ W=cvs.width=window.innerWidth; H=cvs.height=window.innerHeight; }
    resize(); window.onresize = resize;
    function draw() { ctx.fillStyle = '#07040f'; ctx.fillRect(0,0,W,H); requestAnimationFrame(draw); } 
    draw();
</script>
</body>
</html>'''
